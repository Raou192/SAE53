services:
  nginx:
    image: nginx:1.25-alpine
    container_name: sae53-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - keycloak

  backend:
    image: sae53-backend
    container_name: sae53-backend
    restart: unless-stopped
    env_file: .env.docker
    expose:
      - "8000"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: sae53-keycloak
    command: start-dev
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
      KC_HTTP_RELATIVE_PATH: /auth
    expose:
      - "8080"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: sae53-portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    expose:
      - "9000"

  netdata:
    image: netdata/netdata:latest
    container_name: sae53-netdata
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "19999"

volumes:
  portainer_data:
  netdata_config:
  netdata_lib:
  netdata_cache: